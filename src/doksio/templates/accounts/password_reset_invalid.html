{% extends "base.html" %}

{% block title %}Reset-Link ungültig | Doksio{% endblock %}

{% block body %}
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <section class="app-card p-4">
          <h1 class="h4 mb-2">Reset-Link ungültig</h1>
          <p class="text-secondary mb-4">
            Dieser Link ist ungültig oder wurde bereits verwendet. Bitte fordere eine neue Passwort-Reset-Mail an.
          </p>
          <a class="btn btn-outline-primary" href="{% url 'accounts:tenant_login' tenant.slug %}">
            Zur Anmeldung
          </a>
        </section>
      </div>
    </div>
  </main>
{% endblock %}
