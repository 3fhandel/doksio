x-doksio-environment: &doksio-environment
  DJANGO_SETTINGS_MODULE: doksio.project.settings.production
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?set DJANGO_ALLOWED_HOSTS}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:?set DJANGO_CSRF_TRUSTED_ORIGINS}
  DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-true}
  DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER:-true}
  DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
  DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-true}
  DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-true}
  DOKSIO_PUBLIC_BASE_URL: ${DOKSIO_PUBLIC_BASE_URL:?set DOKSIO_PUBLIC_BASE_URL}
  DJANGO_DATA_UPLOAD_MAX_MEMORY_SIZE: ${DJANGO_DATA_UPLOAD_MAX_MEMORY_SIZE:-104857600}
  DJANGO_FILE_UPLOAD_MAX_MEMORY_SIZE: ${DJANGO_FILE_UPLOAD_MAX_MEMORY_SIZE:-5242880}
  POSTGRES_DB: ${POSTGRES_DB:-doksio}
  POSTGRES_USER: ${POSTGRES_USER:-doksio}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  OCR_LANGUAGE: ${OCR_LANGUAGE:-deu+eng}
  OCR_AUTO_START_ON_UPLOAD: ${OCR_AUTO_START_ON_UPLOAD:-true}
  OCR_RUN_INLINE: "false"
  OCR_TESSERACT_TIMEOUT_SECONDS: ${OCR_TESSERACT_TIMEOUT_SECONDS:-120}
  OCR_IMAGE_MAX_EDGE: ${OCR_IMAGE_MAX_EDGE:-3000}
  OCR_IMAGE_MAX_PAGES: ${OCR_IMAGE_MAX_PAGES:-25}
  OCR_IMAGE_ENHANCED_MAX_PAGES: ${OCR_IMAGE_ENHANCED_MAX_PAGES:-1}
  OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-doksio}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
  S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-doksio-documents}
  S3_REGION_NAME: ${S3_REGION_NAME:-eu-central-1}

services:
  web:
    image: doksio:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "false"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        python -m django migrate
        python -m django collectstatic --noinput
        exec gunicorn --bind=0.0.0.0:8000 --workers=$${GUNICORN_WORKERS:-3} --timeout=$${GUNICORN_TIMEOUT:-120} doksio.project.wsgi:application
    environment: *doksio-environment
    ports:
      - "${DOKSIO_HTTP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/s/health/', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    image: doksio:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "false"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        exec celery -A doksio.project worker \
          --loglevel=INFO \
          --concurrency=$${CELERY_WORKER_CONCURRENCY:-1} \
          --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    environment: *doksio-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doksio}
      POSTGRES_USER: ${POSTGRES_USER:-doksio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - doksio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-doksio} -d ${POSTGRES_DB:-doksio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - doksio-redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-doksio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - doksio-minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://127.0.0.1:9000/minio/health/ready >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-doksio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-doksio-documents}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set doksio http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"; do
          echo "Warte auf MinIO..."
          sleep 2
        done
        mc mb --ignore-existing "doksio/$${S3_STORAGE_BUCKET_NAME}"
    depends_on:
      minio:
        condition: service_healthy

volumes:
  doksio-postgres-data:
  doksio-redis-data:
  doksio-minio-data:
