x-app-environment: &app-environment
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-domasy.project.settings.docker}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-local-development-key}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
  POSTGRES_DB: ${POSTGRES_DB:-domasy}
  POSTGRES_USER: ${POSTGRES_USER:-domasy}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domasy}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-domasy}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-domasy-secret}
  S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-domasy-documents}
  S3_REGION_NAME: ${S3_REGION_NAME:-eu-central-1}

services:
  web:
    build:
      context: .
    command: python manage.py runserver 0.0.0.0:8000
    environment: *app-environment
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
    command: celery -A domasy.project worker --loglevel=INFO
    environment: *app-environment
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: domasy
      POSTGRES_USER: domasy
      POSTGRES_PASSWORD: domasy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domasy -d domasy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: domasy
      MINIO_ROOT_PASSWORD: domasy-secret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres-data:
  minio-data:
