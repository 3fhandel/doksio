x-app-environment: &app-environment
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-doksio.project.settings.docker}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-local-development-key}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
  DOKSIO_PUBLIC_BASE_URL: ${DOKSIO_PUBLIC_BASE_URL:-http://localhost:8000}
  DOKSIO_OIDC_ENABLED: ${DOKSIO_OIDC_ENABLED:-false}
  DOKSIO_OIDC_ISSUER_URL: ${DOKSIO_OIDC_ISSUER_URL:-}
  DOKSIO_OIDC_CLIENT_ID: ${DOKSIO_OIDC_CLIENT_ID:-}
  DOKSIO_OIDC_CLIENT_SECRET: ${DOKSIO_OIDC_CLIENT_SECRET:-}
  DOKSIO_OIDC_AUTO_CREATE_USERS: ${DOKSIO_OIDC_AUTO_CREATE_USERS:-true}
  DOKSIO_OIDC_SCOPE: ${DOKSIO_OIDC_SCOPE:-openid email profile}
  DOKSIO_OIDC_USERNAME_CLAIM: ${DOKSIO_OIDC_USERNAME_CLAIM:-preferred_username}
  DOKSIO_OIDC_TENANT_CLAIM: ${DOKSIO_OIDC_TENANT_CLAIM:-doksio_tenants}
  POSTGRES_DB: ${POSTGRES_DB:-doksio}
  POSTGRES_USER: ${POSTGRES_USER:-doksio}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doksio}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  OCR_LANGUAGE: ${OCR_LANGUAGE:-deu+eng}
  OCR_AUTO_START_ON_UPLOAD: ${OCR_AUTO_START_ON_UPLOAD:-true}
  OCR_RUN_INLINE: ${OCR_RUN_INLINE:-false}
  OCR_TESSERACT_TIMEOUT_SECONDS: ${OCR_TESSERACT_TIMEOUT_SECONDS:-120}
  OCR_IMAGE_MAX_EDGE: ${OCR_IMAGE_MAX_EDGE:-3000}
  OCR_IMAGE_MAX_PAGES: ${OCR_IMAGE_MAX_PAGES:-25}
  OCR_IMAGE_ENHANCED_MAX_PAGES: ${OCR_IMAGE_ENHANCED_MAX_PAGES:-1}
  SCAN_OPTIMIZATION_BATCH_SIZE: ${SCAN_OPTIMIZATION_BATCH_SIZE:-100}
  OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
  CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-doksio}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-doksio-secret}
  S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-doksio-documents}
  S3_REGION_NAME: ${S3_REGION_NAME:-eu-central-1}

services:
  web:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command: python manage.py runserver 0.0.0.0:8000
    environment: *app-environment
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command:
      - /bin/sh
      - -c
      - |
        exec celery -A doksio.project worker \
          --loglevel=INFO \
          --concurrency=$${CELERY_WORKER_CONCURRENCY:-1} \
          --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    environment: *app-environment
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  beat:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command:
      - /bin/sh
      - -c
      - |
        exec celery -A doksio.project beat --loglevel=INFO
    environment: *app-environment
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: doksio
      POSTGRES_USER: doksio
      POSTGRES_PASSWORD: doksio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doksio -d doksio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: doksio
      MINIO_ROOT_PASSWORD: doksio-secret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres-data:
  minio-data:
